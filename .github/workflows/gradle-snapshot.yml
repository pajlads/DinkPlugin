name: Build with Snapshot RuneLite
on: pull_request
jobs:
  gradle:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        with:
          cache-provider: basic

      - name: Build using latest runelite snapshot version
        run: ./gradlew --refresh-dependencies -Puse.snapshot clean build -x test
